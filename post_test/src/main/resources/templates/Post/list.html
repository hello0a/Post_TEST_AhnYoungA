<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>게시글 목록</title>
     <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<style>
    body{
        margin:0;
        min-height:100vh;

        background-image:url("/img/mangSpring.jpg"); /* 이미지 경로 */
        background-size:cover;        /* 화면 꽉 채움 */
        background-position:center;   /* 중앙 정렬 */
        background-attachment: fixed;   /* 고정 */

        font-family:Arial;
    }

    .container{
        width:900px;
        margin:80px auto;
        background: rgba(255,255,255,0.8); /* 🔥 반투명 */
        padding:40px;
        border-radius:15px;
        box-shadow:0 10px 25px rgba(0,0,0,0.1);
    }

    .post-header{
        display:flex;
        justify-content:space-between;
        align-items:center;
        margin-bottom:20px;
    }

    h1{
        margin:0;
        font-size:28px;
    }

    /* .post-header a{
        padding:10px 18px;
        text-decoration:none;
        border-radius:8px;
        font-weight:bold;
        transition:0.2s;
    } */

    .post-header a:hover{
        background:#f5f5f51f;
    }

    table{
        width:100%;
        border-collapse:collapse;
        margin-top:10px;
    }

    th{
        background:#f1f2f6;
        padding:12px;
        text-align:center;
        font-size:14px;
        border-bottom:2px solid #ddd;
    }

    td{
        padding:12px;
        text-align:center;
        border-bottom:1px solid #eee;
        font-size:14px;
    }

    td a{
        text-decoration:none;
        color:black;
        display:inline-block;
        transition: transform 0.2s ease;
    }

    td a:hover {
        transform: scale(1.05);
    }

    tr:hover{
        background:#f9f9f9;
    }

    .col-1{ width:5%; }
    .col-3{ width:50%; }
    .col-2{ width:15%; }
    .col-4{ width:20%; }
</style>

<body>
    <div class="container">
        <div class="post-header">
            <h1>게시글 목록</h1>
            <a href="/Post/insert" class="btn btn-dark">글쓰기</a>
        </div>
        <table>
            <colgroup>
                <col class="col-1">
                <col class="col-3">
                <col class="col-2">
                <col class="col-2">
                <col class="col-2">
            </colgroup>
            <tr>
                <th>No</th>
                <th>Title</th>
                <th>Writer</th>
                <th>CreatedAt</th>
                <th>UpdatedAt</th>
            </tr>
            <th:block th:if="${ list == null || list.isEmpty() }">
                <tr>
                    <td colspan="5">조회된 데이터가 없습니다.</td>
                </tr>
            </th:block>
            <th:block th:each="post: ${list}">
                <tr>
                    <td th:text="${post.no}">번호</td>
                    <td> 
                        <a th:href="@{/Post/read(PostNo=${post.no})}" th:text="${post.title}">제목</a>
                    </td>
                    <td th:text="${post.writer}">작성자</td>
                    <td th:text="${#dates.format(post.createdAt, 'yyyy-MM-dd')}">등록일자</td>
                    <td th:text="${#dates.format(post.updatedAt, 'yyyy-MM-dd')}">수정일자</td>
                </tr>
            </th:block>
        </table>
        <!-- 페이지 -->
        <nav aria-label="Page navigation" th:object="${page}" class="d-flex justify-content-center">
            <ul class="page">
                <li class="page-item">
                    <a class="page-link" th:href="@{ ${pageUri } + '&page=' + *{first} }">
                        <span aria-hidden="true">&laquo;</span>
                    </a>
                </li>
                <li class="page-item" th:if="${page.page != page.first}">
                    <a class="page-link" th:href="@{${pageUri } + '&page=' + *{prev} }">
                        <span aria-hidden="true">&lsaquo;</span>
                    </a>
                </li>
                    <th:block th:each="p : ${ #numbers.sequence( page.start, page.end ) }">
                        <li class="page-item" th:classappend="${page.page == page} ? 'active' : '' " aria-current="page">
                            <a class="page-link" th:href="@{${pageUri } + '&page=' + ${page} }" th:text="${page}"></a>
                        </li>
                    </th:block>
                <li class="page-item" th:if="${page.page != page.last}">
                    <a class="page-link" th:href="@{${pageUri } + '&page=' + *{next} }" >
                        <span aria-hidden="true">&rsaquo;</span>
                    </a>
                </li>
                <li class="page-item">
                    <a class="page-link" th:href="@{${pageUri } + '&page=' + *{last} }">
                        <span aria-hidden="true">&raquo;</span>
                    </a>
                </li>
            </ul>
            </nav>
    </div>
</body>
</html>
