<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>게시글 조회</title>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<style>
    body{
        margin: 0;
        min-height: 100vh;

        display: flex;
        justify-content: center;
        align-items: center;
        
        background-image: url("/img/mangspring.jpg");
        background-size: cover;
        background-position: center;
        background-attachment: fixed;

        font-family: Arial;
    }
    .container {
        width: 600px;
        background: rgba(255,255,255,0.8);
        padding: 40px;
        border-radius: 15px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
    }
    /* 상단 */
    .update-header {
        display: flex;
        align-items: center;
        margin-bottom: 30px;
    }
    .update-header h1{
        margin: 0;
        font-size: 25px;
        padding-left: 180px;
    }
    .form-control{
        width: 100%;
        padding: 10px 10px;
        border: 1px solid #ddd;
        border-radius: 8px;
        font-size: 14px;
        outline: none;
        transition: 0.2s;
        flex: 6;
    }
    .form-control:focus{
        border-color: #ff6b81;
        box-shadow: 0 0 5px rgb(255, 107, 129,0.4);
    }
    .form-label{
        font-weight: bold;
        margin-bottom: 6px;
        display: block;
        flex: 1;
    }
    .mb-3{
        display: flex;
        align-items: center;
        margin-bottom: 10px;
    }
    .content-group{
        flex-direction: column;
        align-items: flex-start;
    }
    #content {
        min-height: 200px;
        overflow: hidden;
        text-align: center;
    }
    button {
        cursor: pointer;
    }
    .btn-group{
        display:flex;
        gap:10px;
        margin-top:15px;
        margin-left:auto;
        width:fit-content;
    }

    .btn-group button{
        border-radius:8px !important;
    }

    .btn-delete:hover {
        background-color: #dc3545 !important;
        border-color: #ddd !important;
    }
    .update-header button {
        background:none;
        border:none;
        padding:0;
        cursor:pointer;
    }

    /* toast 위치 */
    .toast-container{
        position:fixed;
        top:50px;              
        left:50%;

        transform:translateX(-50%);
        z-index:1000;

        will-change: transform, opacity;
    }

    /* toast 디자인 */
    .delete-toast{
        background:white;
        border:1px solid black;
        border-radius:10px;
        padding:15px 20px;
        box-shadow:0 4px 10px rgba(0,0,0,0.15);
        display:none;
    }

    /* 버튼 영역 */
    .toast-buttons{
        margin-top:10px;
        display:flex;
        gap:10px;
        justify-content:flex-end;
    }

    /* 삭제 버튼 */
    .btn-confirm{
        background:black;
        color:white;
        border:none;
        padding:6px 12px;
        border-radius:6px;
        cursor:pointer;
    }

    /* 취소 버튼 */
    .btn-cancel{
        background:#ddd;
        border:none;
        padding:6px 12px;
        border-radius:6px;
        cursor:pointer;
    }

    .toast-enter {
        animation: toast-pop 0.35s ease forwards;
        }
        @keyframes toast-pop {
        0% {
            opacity: 0;
            transformp: translateX(-12px) scale(0.85);
        }
        60% {
            opacity: 1;
            transform: translate(0) scale(1.05);
        }
        100% {
            opacity: 1;
            transform: translate(0) scale(1);
        }
    }

    .toast-exit {
        animation: toast-out 0.25s ease forwards;
        }
        @keyframes toast-out {
        0% {
            opacity: 1;
            transform: scale(1);
        }
        40% {
            transform: scale(1.05);
        }
        100% {
            opacity: 0;
            transform: scale(0.75);
        }
    }
</style>
<body>
    <div class="container">
        <div class="update-header">
            <button type="button" onclick="moveList()" title="목록">
                <span class="material-symbols-outlined" style="color: black;">
                    arrow_back
                </span>
            </button>
            <h1>게시글 수정</h1>
        </div>
        <form id="form" action="/Post/update" method="post" th:object="${post}">
            <input type="hidden" th:field="*{no}">
            <div class="mb-3">
                <label for="" class="form-label">제목</label>
                <input type="text" class="form-control" id=title th:field="*{title}">
            </div>
            <div class="mb-3">
                <label for="" class="form-label">작성자</label>
                <input type="text" class="form-control" id=writer th:field="*{writer}">
            </div>
            <div class="mb-3 content-group">
                <label for="" class="form-label">내용</label>
                <input type="text" class="form-control" id=content th:field="*{content}">
            </div>
            <div class="btn-group">
                <button type="submit" class="btn btn-dark" onclick="moveUpdate()">수정</button>
                <button type="button" class="btn btn-dark btn-delete" onclick="actionDelete()">삭제</button>
            </div>
            <!-- 삭제 확인 Toast -->
            <div class="toast-container position-fixed bottom-0 end-0 p-3">
                <div id="deleteToast" class="toast delete-toast">
                    <div class="toast-body">
                        정말 삭제하시겠습니까?
                        <div class="toast-buttons">
                            <button class="btn-confirm" onclick="confirmDelete()">삭제</button>
                            <button class="btn-cancel" onclick="closeToast()">취소</button>
                        </div>
                    </div>
                </div>
            </div>
        </form>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let no = '[[${post.no}]]'

        function moveList() {
            location.href = '/Post/list'
        }

        let $form = document.getElementById("form")
        let toast = document.getElementById("deleteToast")

        function actionDelete(){
            toast.style.display = "block"
            toast.classList.remove("toast-exit")
            toast.classList.add("toast-enter")
        }

        function closeToast(){
            toast.classList.remove("toast-enter")
            toast.classList.add("toast-exit")

            setTimeout(()=>{
                toast.style.display = "none"
            },250)
        }

        function confirmDelete(){
            $form.action = '/Post/delete?PostNo=' + no
            $form.submit()
        }
    </script>
</body>
</html>
