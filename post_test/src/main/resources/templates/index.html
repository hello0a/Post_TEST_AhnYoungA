<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>메인화면</title>
</head>

<style>
    body{
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: #f5f6fa;
        font-family: Arial;
    }
    .card {
        width: 350px;
        height: 400px;
        padding-bottom: 20px;
        border-radius: 20px;
        background-image: url("/img/mang.jpg");
        background-size: cover;
        background-position: center;
        box-shadow: 0 10px 25px rgba(0,0,0,0.2);

        display: flex;
        flex-direction: column;
        text-align: center;
        align-items: center;
        justify-content: space-between;
    }
    .card h1{
        margin-bottom: 5px;
    }
    .card a{
        display: inline-block;
        padding: 12px;
        margin-top: 10px;
        border-radius: 10px;
        background: black;
        color: white;
        text-decoration: none;
        font-weight: bold;
    }
    .card a:hover {
        background: rgba(0, 0, 0, 0.555);
    }
</style>

<body>
    <div class="card">
        <h1>Post_TEST</h1>
        <a href="/Post/list">게시글 목록</a>
    </div>
</body>
</html>
